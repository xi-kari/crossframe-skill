default_prompt: "使用 crossframe-max：不走 suite 的 2+1 选择器，不走普通文章类型选择器。先读 max-worldview-protocol，建立 max-worldview-capsule，再把对象当作局部世界建模；生成 max-position-matrix，列出行动者、承接者、受害者、旁观者、制度主体、沉默者、退出者和未来主体；主动检索与反向检索事实材料，生成 max-source-frontier，标注资料快照时间、缺失材料、冲突材料、缺席主体、检索反身性、停止条件和未穷尽资料队列；生成 max-transcendence-window，区分不可升格的未知、开放行动信号、误读为爱风险和撤回条件，不把爱写成忍耐义务；按结构变量展开概念卡、概念契约、v5 连续闭包、演化路径和 claim ledger，生成 max-path-confidence-layers，分清事实路径、机制候选路径、低置信想象实验、纯反事实路径和价值性解释路径；生成 max-red-team-pass，检查框架偏好遮蔽、过度解释和解释力幻觉；生成 max-unexhaustible-declaration；执行 artifact-first gate，先写入产物目录，至少包含 max-artifact-manifest.md、max-dossier.md、max-essay.md、max-continuation-ledger.md、max-continuation-index.md，完整文章必须单独放在 max-essay.md；聊天 final 给产物路径、校验结果、阅读导引、下一轮入口，并正常列出可继续讨论的分支，不能只把分支藏在文件里；用 max-output-layers 说明 max-dossier、max-essay、max-continuation-index 和 max-continuation-ledger / max-run-state 的关系；执行 template-fidelity gate，模板是 contract，不是参考；执行 longform-dominance gate，max-essay 是最终完整解释层，不能只是 max-dossier 的摘要，且应明显大于底稿；产物交付前运行 scripts/check_crossframe_max_artifacts.py。"
