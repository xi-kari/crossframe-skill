interface:
  display_name: CrossFrame History
  short_description: 历史、文明连续史、史料闭合与 archive/FOIA backlog 的领域接口层。
  default_prompt: "用 crossframe-history 分析这个历史节点，区分史料档位、断代尺度、CrossFrame 主干解释、解释失败处、archive/FOIA backlog 和公开表达边界。如产生新增判断，必须作为 claim ledger delta 交回主链；没有 claim_id 的判断不得进入输出。"
policy:
  allow_implicit_invocation: false
  explicit_command_allowed: true
  suite_routing_allowed: true
