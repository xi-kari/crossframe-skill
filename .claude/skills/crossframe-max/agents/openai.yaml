default_prompt: "使用 crossframe-max：不走 suite 的 2+1 选择器，不走普通文章类型选择器。先读 max-worldview-protocol，建立 max-worldview-capsule，再把对象当作局部世界建模；生成 max-position-matrix，列出行动者、承接者、受害者、旁观者、制度主体、沉默者、退出者和未来主体；主动检索与反向检索事实材料，生成 max-source-frontier，标注资料快照时间、缺失材料、冲突材料、缺席主体、检索反身性、停止条件和未穷尽资料队列；生成 max-transcendence-window，区分不可升格的未知、开放行动信号、误读为爱风险和撤回条件，不把爱写成忍耐义务；按结构变量展开概念卡、概念契约、v5 连续闭包、演化路径和 claim ledger，生成 max-path-confidence-layers，分清事实路径、机制候选路径、低置信想象实验、纯反事实路径和价值性解释路径；生成 max-red-team-pass，检查框架偏好遮蔽、过度解释和解释力幻觉；生成 max-unexhaustible-declaration；用 max-output-layers 输出 max-dossier、max-essay 和 max-continuation-index，并维护 max-continuation-ledger / max-run-state；执行 template-fidelity gate，模板是 contract，不是参考，产物交付前运行 scripts/check_crossframe_max_artifacts.py。"
