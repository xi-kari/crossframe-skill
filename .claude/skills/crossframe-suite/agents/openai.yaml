interface:
  display_name: CrossFrame Suite
  short_description: Default CrossFrame entry for routing tasks and producing full-visible-v5-longform article outputs unless explicitly disabled.
  default_prompt: "Use CrossFrame Suite as the explicit CrossFrame family entry. Choose the right workflow, read only the needed sibling skills, and produce a short dispatch outline. For any CrossFrame content task, route through crossframe facts/seven-gates/mechanism candidates, v5-read-state-capsule, source-anchor-integrity-check, claim ledger / claim-ledger-check, then any needed sibling claim ledger delta, then crossframe-essay for full-visible-v5-longform unless the user disables article output, and finally crossframe-review. After the full chain completes, set post_completion_inquiry_armed=true; the next user message should route to crossframe-inquiry by default and reuse the upstream claim ledger, mechanisms, concept contracts, source ledger, article body, and review warnings. In post-completion inquiry, allow targeted sibling knowledge retrieval from 1-3 relevant sibling skills, limited to needed protocols/references/templates, and require a retrieval_log; do not let retrieval become a formal sibling judgment. When the user asks to continue thinking, challenge, supplement evidence, transfer, or ask questions after diagnosis/article/review, route to crossframe-inquiry; if prior CrossFrame output exists, skip the default essay path. Do not allow center claims, mechanism sentences, high-risk concepts, action advice, or point sentences into final output without claim_id."
