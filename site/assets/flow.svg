<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">CrossFrame quality chain</title>
  <desc id="desc">source_id to claim_id to concept contract to review to inquiry.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6f6a60"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#3e3420" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="720" height="720" fill="#fffaf1"/>
  <g stroke="#ded6c8" stroke-width="1">
    <path d="M0 120h720M0 240h720M0 360h720M0 480h720M0 600h720"/>
    <path d="M120 0v720M240 0v720M360 0v720M480 0v720M600 0v720"/>
  </g>
  <g fill="none" stroke="#6f6a60" stroke-width="3" marker-end="url(#arrow)">
    <path d="M172 202 C250 140 314 151 364 210"/>
    <path d="M403 250 C463 296 472 354 433 417"/>
    <path d="M383 460 C314 510 250 506 190 444"/>
    <path d="M184 385 C135 318 129 260 172 202"/>
    <path d="M240 202 L478 478"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="72" y="158" width="190" height="88" rx="8" fill="#fffdf7" stroke="#ded6c8" stroke-width="2"/>
    <rect x="322" y="158" width="210" height="88" rx="8" fill="#fffdf7" stroke="#ded6c8" stroke-width="2"/>
    <rect x="360" y="414" width="220" height="88" rx="8" fill="#fffdf7" stroke="#ded6c8" stroke-width="2"/>
    <rect x="92" y="378" width="210" height="88" rx="8" fill="#fffdf7" stroke="#ded6c8" stroke-width="2"/>
  </g>
  <g font-family="Segoe UI, Noto Sans SC, Microsoft YaHei, sans-serif">
    <text x="95" y="194" fill="#5b6ee1" font-size="16" font-weight="800">source_id</text>
    <text x="95" y="222" fill="#1f2328" font-size="20" font-weight="700">证据边界</text>
    <text x="345" y="194" fill="#2f9e8f" font-size="16" font-weight="800">claim_id</text>
    <text x="345" y="222" fill="#1f2328" font-size="20" font-weight="700">中心命题</text>
    <text x="383" y="450" fill="#b7791f" font-size="16" font-weight="800">review</text>
    <text x="383" y="478" fill="#1f2328" font-size="20" font-weight="700">质量闸</text>
    <text x="115" y="414" fill="#b84a4a" font-size="16" font-weight="800">inquiry</text>
    <text x="115" y="442" fill="#1f2328" font-size="20" font-weight="700">继续追问</text>
    <text x="275" y="344" fill="#1f2328" font-size="22" font-weight="800">concept contract</text>
    <text x="286" y="376" fill="#6f6a60" font-size="17">概念不能变口号</text>
  </g>
  <g>
    <circle cx="360" cy="360" r="64" fill="#f7f3ea" stroke="#ded6c8" stroke-width="2"/>
    <path d="M330 370 357 324l35 58" fill="none" stroke="#5b6ee1" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
