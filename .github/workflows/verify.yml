name: Verify CrossFrame Repository

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill integrity
        run: python scripts/check_crossframe_skill_integrity.py --repo .

      - name: Validate source continuity materials
        run: python scripts/check_source_continuity.py --materials-only --repo .

      - name: Validate script syntax
        run: |
          bash -n scripts/install-codex.sh
          python -m py_compile scripts/*.py

      - name: Validate PowerShell installer syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile("scripts/install-codex.ps1", [ref] $tokens, [ref] $errors) > $null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Validate claim ledger schema JSON
        run: |
          python -m json.tool skills/crossframe/schemas/claim-ledger.schema.json > /dev/null
          python -m json.tool skills/crossframe/schemas/seven-gates-quant.schema.json > /dev/null
          python -m json.tool skills/crossframe/schemas/evidence-ledger-v5-dlc.schema.json > /dev/null
          python -m json.tool skills/crossframe/schemas/calibration-anchor.schema.json > /dev/null
          python -m json.tool skills/crossframe/schemas/mechanism-update.schema.json > /dev/null
          python -m json.tool skills/crossframe/schemas/counterexample-register.schema.json > /dev/null
          python -m json.tool skills/crossframe-max/schemas/max-validator-report.schema.json > /dev/null
          python -m json.tool skills/crossframe-max/schemas/max-repair-plan.schema.json > /dev/null

      - name: Install schema validator
        run: python -m pip install jsonschema

      - name: Validate claim ledger schema fixtures
        run: |
          python scripts/validate_claim_ledger_schema_fixtures.py --repo .
          python scripts/validate_v5_dlc_quantification_schema_fixtures.py --repo .

      - name: Validate v5 DLC casebook trials
        run: python scripts/check_v5_dlc_casebook_trials.py --repo .

      - name: Validate v5 DLC publication bundle
        run: python scripts/check_v5_dlc_publication_bundle.py --repo .

      - name: Validate CrossFrame Max v6 full source
        run: python scripts/check_crossframe_max_v6_full_source.py --repo .

      - name: Validate CrossFrame Max registry anchors
        run: python scripts/check_crossframe_max_v6_registry_anchors.py --repo .

      - name: Validate CrossFrame Max route ledger fixtures
        run: python scripts/validate_crossframe_max_route_ledger_fixtures.py

      - name: Validate CrossFrame Max repair fixtures
        run: python scripts/validate_crossframe_max_repair_fixtures.py

      - name: Validate CrossFrame Max repair planner smoke
        run: |
          temp_dir="$(mktemp -d)"
          python scripts/validate_crossframe_max_repair_fixtures.py --write-valid-fixture "$temp_dir"
          python scripts/build_crossframe_max_repair_plan.py --workspace "$temp_dir" --dry-run

      - name: Check mirror sync
        run: python scripts/sync_skill_mirrors.py --check

      - name: Package smoke test
        run: |
          python scripts/package_crossframe_skill.py --repo . --version ci
          python - <<'PY'
          import zipfile
          from pathlib import Path

          zips = sorted(Path("outputs").glob("crossframe-skill-suite-ci-*.zip"))
          if not zips:
              raise SystemExit("package smoke did not create a ci zip")
          with zipfile.ZipFile(zips[-1]) as archive:
              names = set(archive.namelist())
          for name in [
              "scripts/install-codex.sh",
              "scripts/install-codex.ps1",
              ".github/workflows/verify.yml",
              "skills/crossframe-max/protocols/max-repair-loop-protocol.md",
              "skills/crossframe-max/schemas/max-repair-plan.schema.json",
          ]:
              if name not in names:
                  raise SystemExit(f"package smoke missing: {name}")
          print(f"ok: package smoke -> {zips[-1]}")
          PY

      - name: Git whitespace check
        run: git diff --check
